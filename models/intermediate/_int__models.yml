version: 2

models:
  - name: int_bookings_enriched
    description: Booking grain with derived nights, channel fee, and net revenue.
    columns:
      - name: booking_id
        data_tests: [not_null, unique]
      - name: nights
        description: Occupied nights = check_out_date - check_in_date.
      - name: net_revenue
        description: gross_amount minus channel fee.

  - name: int_occupancy_spined
    description: One row per property per occupied night, exploded from confirmed bookings.

unit_tests:
  - name: test_nights_and_net_revenue
    description: Nights and net revenue derive correctly from a known booking + fee rate.
    # CSV fixtures (not dict): values are cast to the model's column types, so the
    # numeric(,2) money columns compare exactly. In dict format YAML reads 45.00 as
    # the float 45.0, which mismatches the model's 45.00.
    model: int_bookings_enriched
    given:
      - input: ref('stg_rentals__bookings')
        format: csv
        rows: |
          booking_id,property_id,guest_id,channel_code,booking_status,check_in_date,check_out_date,gross_amount,updated_at
          b1,p1,g1,airbnb,confirmed,2026-03-01,2026-03-04,300.00,2026-02-01 00:00:00
          b2,p2,g2,direct,confirmed,2026-03-10,2026-03-12,200.00,2026-02-05 00:00:00
      - input: ref('channel_fee_rates')
        format: csv
        rows: |
          channel_code,fee_rate
          airbnb,0.1500
          direct,0.0000
    expect:
      format: csv
      rows: |
        booking_id,nights,channel_fee,net_revenue
        b1,3,45.00,255.00
        b2,2,0.00,200.00
