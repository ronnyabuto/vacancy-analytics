version: 2

models:
  - name: int_bookings_enriched
    description: Booking grain with derived nights, channel fee, and net revenue.
    columns:
      - name: booking_id
        data_tests: [not_null, unique]
      - name: nights
        description: Occupied nights = check_out_date - check_in_date.
      - name: net_revenue
        description: gross_amount minus channel fee.

  - name: int_occupancy_spined
    description: One row per property per occupied night, exploded from confirmed bookings.

unit_tests:
  - name: test_nights_and_net_revenue
    description: Nights and net revenue derive correctly from a known booking + fee rate.
    model: int_bookings_enriched
    given:
      - input: ref('stg_rentals__bookings')
        format: dict
        rows:
          - {booking_id: "b1", property_id: "p1", guest_id: "g1", channel_code: airbnb, booking_status: confirmed, check_in_date: "2026-03-01", check_out_date: "2026-03-04", gross_amount: 300.00, currency: USD, created_at: "2026-02-01 00:00:00", updated_at: "2026-02-01 00:00:00"}
          - {booking_id: "b2", property_id: "p2", guest_id: "g2", channel_code: direct, booking_status: confirmed, check_in_date: "2026-03-10", check_out_date: "2026-03-12", gross_amount: 200.00, currency: USD, created_at: "2026-02-05 00:00:00", updated_at: "2026-02-05 00:00:00"}
      - input: ref('channel_fee_rates')
        format: dict
        rows:
          - {channel_code: airbnb, fee_rate: 0.1500}
          - {channel_code: direct, fee_rate: 0.0000}
    expect:
      format: dict
      rows:
        - {booking_id: "b1", nights: 3, channel_fee: 45.00, net_revenue: 255.00}
        - {booking_id: "b2", nights: 2, channel_fee: 0.00, net_revenue: 200.00}
