name: 'vacancy_analytics'
version: '1.0.0'
config-version: 2

# Stay on the 1.x line (v2.0 is alpha as of June 2026). Floor is 1.10: it covers
# the 1.9 YAML snapshot config and the nested-`arguments` generic-test syntax used
# in the model YAML. The dbt-postgres adapter (1.10.1 stable) pulls a compatible core.
require-dbt-version: [">=1.10.0", "<2.0.0"]

profile: 'vacancy_analytics'

model-paths: ["models"]
snapshot-paths: ["snapshots"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  vacancy_analytics:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table

seeds:
  vacancy_analytics:
    channel_fee_rates:
      +column_types:
        channel_code: varchar
        fee_rate: numeric(5,4)
