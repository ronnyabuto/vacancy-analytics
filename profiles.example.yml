# Copy to ~/.dbt/profiles.yml and fill in credentials via env vars.
# Real secrets stay out of git — export the DBT_* vars in your shell.
#
# Two targets: `dev` (Postgres, local) and `prod` (Snowflake). The models are
# portable across both. Switch with: dbt build --target prod
vacancy_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: localhost
      port: 5432
      user: "{{ env_var('DBT_PG_USER') }}"
      password: "{{ env_var('DBT_PG_PASSWORD') }}"
      dbname: vacancy_analytics
      schema: analytics      # models build into analytics; snapshots into analytics_snapshots
      threads: 4
      keepalives_idle: 0

    prod:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"   # e.g. ab12345.eu-west-1
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"  # or use private_key_path / authenticator: externalbrowser
      role: TRANSFORMER                                # least-privilege role, not ACCOUNTADMIN
      warehouse: VACANCY_WH                            # compute; auto-suspend after 60s
      database: VACANCY
      schema: ANALYTICS
      threads: 8                                       # Snowflake scales out; more threads = more parallelism
